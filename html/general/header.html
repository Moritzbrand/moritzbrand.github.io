<!-- header.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link rel="stylesheet" href="../../css/colors.css">
    <link rel="stylesheet" href="../../css/base.css">
    <style>
        .page {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-end;
            background: transparent;
            overflow: hidden;
        }

        .flags {
            display: flex;
            justify-content: center;
            gap: 0.2cm;
            padding-right: 5vw;
        }

        .flag-wrapper {
            position: relative;
            width: 0.7cm;
            height: 0.5cm;
            padding: 0.4cm;
            box-sizing: content-box;
        }

        .flag-button {
            width: 150%;
            height: 100%;
            padding: 0;
            border: none;
            background: transparent;
            appearance: none;
            cursor: pointer;
            display: block;
        }

        .flag-frame {
            border: none;
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .home {
            position: absolute;
            top: 15px;
            left: 15px;
            color: var(--color_text);
        }

        .home a,
        .home a:visited {
            color: var(--color_text);
            text-decoration: none;
            display: block;
        }

        .home svg {
            display: block;
            fill: var(--color_text);
        }

      
    </style>
</head>
<body>
    <div class="page">
        <div class="flags">
            <div class="flag-wrapper">
                <button type="button" class="flag-button" onclick="setLanguage('de')">
                    <iframe class="flag-frame" src="german_flag.html" title="German Flag"></iframe>
                </button>
            </div>

            <div class="flag-wrapper">
                <button type="button" class="flag-button" onclick="setLanguage('en')">
                    <iframe class="flag-frame" src="british_flag.html" title="British Flag"></iframe>
                </button>
            </div>
        </div>

        <div class="home">
            <a href="../home/home.html" target="_parent">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-house-fill" viewBox="0 0 16 16">
                    <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L8 2.207l6.646 6.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293z"/>
                    <path d="m8 3.293 6 6V13.5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 13.5V9.293z"/>
                </svg>
            </a>
        </div>
    </div>
    <script src="../../js/change_language.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("hideHome") === "1") {
            document.querySelector(".home").style.display = "none";
        }
    </script>
</body>
</html>
