<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/base.css">
    <style>
        .header-frame {
            width: 100%;
            border: none;
            display: block;
            height: wrap-content;
            background-color: transparent;
            margin: 0;
            margin-bottom: -150px;
            margin-top: -10px;
            margin-right: -20px;
        }
       
        .page {
            padding-top: 20px;
            padding-bottom: 20px;
            min-height: 100vh;
            background: linear-gradient(to bottom left, var(--color_bg)50%, var(--color_primary) 200%);
        }

        h1 {
            margin: 40px;
            font-size: calc(64px + 2vw);
            font-weight: bold;
        }

        .nav-frame {
            width: 100%;
            border: none;
            display: block;
            height: 240px;
            background-color: transparent;
        }

        .profile-frame {
            width: 100%;
            border: none;
            display: block;
            height: 240px;
            background-color: transparent;
            padding-bottom: 1cm;
        }

        @media (max-width: 800px) {

            h1 {
                font-size: 48px;
                margin-bottom: 20px;
            }

            .nav-frame {
                height: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <iframe class="header-frame" src="header.html" title="Header"></iframe>
        <h1 id="headline_portfolio">Portfolio</h1>

        <iframe class="nav-frame" src="nav.html" title="Navigation"></iframe>
        <iframe class="profile-frame" src="profile.html" title="Navigation"></iframe>
    </div>
    <script src="js/change_language.js"></script>
    <script>
    window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "set-language") {
            const lang = event.data.language;
            localStorage.setItem("language", lang);
            document.documentElement.lang = lang;

            const frames = document.querySelectorAll("iframe");
            frames.forEach(frame => {
                if (frame.contentWindow) {
                    frame.contentWindow.postMessage({ type: "set-language", language: lang }, "*");
                }
            });
        }
    });
</script>
</body>
</html>
