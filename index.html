<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/colors.css">
    <link rel="stylesheet" href="css/base.css">
    <style>

        body{
            overflow: hidden;
        }
        .page {
            padding-top: 20px;
            padding-bottom: 20px;
            height: 100vh;
            background: linear-gradient(to bottom left, var(--color_bg)50%, var(--color_primary) 200%);
            overflow: hidden;
        }

        h1 {
            margin: 40px;
            font-size: calc(64px + 2vw);
            font-weight: bold;
        }

        .nav-frame {
            width: 100%;
            border: none;
            display: block;
            height: 240px;
            background-color: transparent;
        }

        .profile-frame {
            width: 100%;
            border: none;
            display: block;
            height: 240px;
            background-color: transparent;
        }

        @media (max-width: 800px) {

            h1 {
                font-size: 48px;
                margin-bottom: 20px;
            }

            .nav-frame {
                height: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Portfolio</h1>

        <iframe class="nav-frame" src="nav.html" title="Navigation"></iframe>
        <iframe class="profile-frame" src="profile.html" title="Navigation"></iframe>
    </div>
</body>
</html>
